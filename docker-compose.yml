services:
  postgres:
    image: postgres:16
    container_name: datashare-postgres
    environment:
      POSTGRES_DB: datashare
      POSTGRES_USER: datashare
      POSTGRES_PASSWORD: datashare
    ports:
      - "5432:5432"
    volumes:
      - datashare_pg_data:/var/lib/postgresql/data

volumes:
  datashare_pg_data: